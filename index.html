<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAN PQ Analyzer v1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.hdr{padding:14px 24px;border-bottom:1.5px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:800}.hdr h1 b{color:#2563eb}
.hdr .v{font-size:10px;color:#94a3b8;font-weight:700;background:#f1f5f9;padding:2px 7px;border-radius:5px;margin-left:6px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;border:1.5px solid}
.tabs{display:flex;border-bottom:1.5px solid #e2e8f0;padding:0 16px;background:#fff;overflow-x:auto;gap:1px}
.tab{padding:11px 14px;border:none;cursor:pointer;background:0 0;color:#94a3b8;font-size:12px;font-weight:500;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:#2563eb;font-weight:700;border-bottom-color:#2563eb}
.cnt{padding:20px 24px;max-width:1100px;margin:0 auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:920px}
.sp2{grid-column:1/-1}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;box-shadow:0 1px 3px #0000000a;margin-bottom:16px}
.ct{margin:0 0 14px;font-size:11px;font-weight:800;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.gi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ig{display:flex;flex-direction:column;gap:4px}
.ig label{font-size:10px;color:#475569;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.ig input{background:#fff;border:1.5px solid #e2e8f0;border-radius:7px;padding:8px 10px;color:#0f172a;font-size:13px;font-family:Consolas,monospace;width:100%;outline:0}
.ig input:focus{border-color:#2563eb}.ig input:disabled{background:#f1f5f9;color:#94a3b8}
.iu{display:flex;align-items:center;gap:5px}.un{font-size:10px;color:#94a3b8;white-space:nowrap;font-weight:600}
.tg{display:inline-flex;background:#f1f5f9;border-radius:8px;padding:2px;gap:2px;border:1px solid #e2e8f0}
.tg button{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:0 0;color:#475569}
.tg button.on{background:#2563eb;color:#fff;box-shadow:0 1px 3px #2563eb4d}
.cb{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:500;user-select:none}
.cb .bx{width:18px;height:18px;border-radius:4px;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb.on .bx{border-color:#2563eb;background:#2563eb}
.cb .bx::after{content:'\2713';color:#fff;font-size:11px;font-weight:800;display:none}.cb.on .bx::after{display:block}
.sub{margin-left:26px;border-left:2px solid #e2e8f0;padding-left:14px;display:flex;flex-direction:column;gap:8px}
.sep{border-top:1px solid #f1f5f9;padding-top:10px;margin-top:4px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;color:#fff}
.ba{background:#2563eb}.bg{background:#059669}.bp{background:#7c3aed}.by{background:#f1f5f9;color:#475569}
.bs{padding:5px 12px;font-size:11px}.br{display:flex;gap:8px;flex-wrap:wrap}
.dt{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;font-family:Consolas,monospace}
.dt th{padding:8px 8px;border-bottom:2px solid #e2e8f0;color:#475569;font-weight:800;font-size:10px;background:#f1f5f9;text-align:right;white-space:nowrap}
.dt th:first-child{text-align:left}.dt td{padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:right}
.dt td:first-child{text-align:left}.dt tr:nth-child(even){background:#f8fafc}
.dt .cc{color:#2563eb;font-weight:700}
.ph{min-height:200px;display:flex;align-items:center;justify-content:center;border:2px dashed #e2e8f0;border-radius:12px;background:#f1f5f9;text-align:center;color:#475569;padding:20px}
.si{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:9px;background:#fff;border:1px solid #e2e8f0;margin-bottom:7px}
.si.dm{opacity:.45}
.hint{font-size:11px;color:#475569;margin-bottom:12px;padding:8px 12px;background:#eff6ff;border-radius:7px;border:1px solid #dbeafe;line-height:1.6}
.cin{width:76px;padding:5px 7px;border:1.5px solid #f1f5f9;border-radius:5px;font-family:Consolas,monospace;font-size:12px;text-align:right;background:0 0;color:#0f172a;outline:0}
.cin:focus{border-color:#2563eb}
/* Excel-like grid */
.xls{width:100%;border-collapse:collapse;font-family:Consolas,monospace;font-size:12px;border:1.5px solid #9ca3af}
.xls th{padding:6px 8px;background:#f0f0f0;border:1px solid #c0c0c0;color:#333;font-weight:700;font-size:10px;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:1}
.xls th.col-num{background:#e8e8e8;width:36px;color:#666;font-size:10px}
.xls th.col-input{background:#dbeafe;color:#1e40af}
.xls th.col-calc{background:#d1fae5;color:#065f46}
.xls td{padding:0;border:1px solid #d0d0d0;height:28px}
.xls td.rn{background:#f5f5f5;text-align:center;font-size:10px;color:#888;width:36px;padding:0 4px}
.xls td.ci{padding:0}
.xls td.ci input{width:100%;height:100%;padding:4px 6px;border:none;outline:0;font-family:Consolas,monospace;font-size:12px;text-align:right;background:transparent;box-sizing:border-box}
.xls td.ci input:focus{background:#eff6ff;outline:2px solid #2563eb;outline-offset:-2px}
.xls td.cv{padding:4px 8px;text-align:right;color:#059669;font-weight:600;background:#f8fffe}
.xls td.cv.empty{color:#ccc;font-weight:400}
.xls td.del{text-align:center;padding:0;width:30px;background:#fefefe}
.xls tr:hover td{background:#fafafa}
.xls tr:hover td.ci input{background:#fafafa}
.xls tr:hover td.ci input:focus{background:#eff6ff}
.xls tr.selected td{background:#eff6ff}
.xls .rpm-bar{display:inline-block;width:4px;height:16px;border-radius:2px;margin-right:4px;vertical-align:middle}
</style>
</head>

<script>
var MF='Consolas,monospace';
function calcQ(dp,d1,d2,cd,rho){if(dp<=0)return 0;var a2=Math.PI*Math.pow(d2/2000,2),b=d2/d1;return cd*a2*Math.sqrt(2*dp/(rho*(1-Math.pow(b,4))))*60;}
function calcPv(q,d1,rho){var a1=Math.PI*Math.pow(d1/2000,2),v=q/60/a1;return .5*rho*v*v;}

function calcEff(q,pf,w){return(w<=0||q<=0)?0:(q/60*pf)/w*100;}

function fitK(pts){if(!pts||!pts.length)return 0;var v=pts.filter(function(p){return p.q>0&&p.dp>0;});if(!v.length)return 0;var num=0,den=0;v.forEach(function(p){num+=p.dp*p.q*p.q;den+=p.q*p.q*p.q*p.q;});return den>0?num/den:0;}

function cht(o){var data=o.data,xk=o.xk,yk=o.yk,xl=o.xl,yl=o.yl,ttl=o.ttl,W=o.W||620,H=o.H||380,fit=o.fit,sys=o.sys||[],ann=o.ann||[],rcm=o.rcm;

svg.appendChild(se('rect',{x:p.l,y:p.t,width:cw,height:ch,fill:'#fafbfd',rx:3}));
for(var i=0;i<=5;i++){var yv=yM*i/5,xv=xM*i/5;svg.appendChild(se('line',{x1:p.l,y1:sy2(yv),x2:p.l+cw,y2:sy2(yv),stroke:'#e2e8f0','stroke-width':1}));svg.appendChild(st(p.l-8,sy2(yv)+4,yv>100?yv.toFixed(0):yv.toFixed(2),null,null,'end'));svg.appendChild(se('line',{x1:sx(xv),y1:p.t,x2:sx(xv),y2:p.t+ch,stroke:'#e2e8f0','stroke-width':1}));svg.appendChild(st(sx(xv),p.t+ch+18,xv>100?xv.toFixed(0):xv.toFixed(2)));}
svg.appendChild(st(p.l+cw/2,H-3,xl,'#475569',11,null,'700'));var yl2=st(13,p.t+ch/2,yl,'#475569',11,null,'700');yl2.setAttribute('transform','rotate(-90 13 '+(p.t+ch/2)+')');svg.appendChild(yl2);svg.appendChild(st(p.l,p.t-12,ttl,'#0f172a',12,'start','800'));
rpms.forEach(function(rpm){var rd=data.filter(function(d){return d._r===rpm;}).sort(function(a,b){return a[xk]-b[xk];});var col=rcm&&rcm[rpm]?rcm[rpm]:rC(rpm);var xs=rd.map(function(d){return d[xk];}),ys=rd.map(function(d){return d[yk];});var pd='';if(fit&&rd.length>=3){var pts=fCurve(xs,ys,60);pd=pts.filter(function(pt){return pt.y>=0;}).map(function(pt,j){return(j?'L':'M')+sx(pt.x).toFixed(1)+','+sy2(pt.y).toFixed(1);}).join(' ');}else{pd=rd.map(function(d,j){return(j?'L':'M')+sx(d[xk]).toFixed(1)+','+sy2(d[yk]).toFixed(1);}).join(' ');}if(pd)svg.appendChild(se('path',{d:pd,fill:'none',stroke:col,'stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round'}));rd.forEach(function(d){svg.appendChild(se('circle',{cx:sx(d[xk]),cy:sy2(d[yk]),r:4,fill:'#fff',stroke:col,'stroke-width':2.5}));});});

function getBEPs(ed,rpms){return rpms.map(function(rpm){var rd=ed.filter(function(d){return d.rpm===rpm;}),xs=rd.map(function(d){return d.q;}),ys=rd.map(function(d){return d.eff;}),f=pFit(xs,ys),col=rC(rpm);if(f&&f.a<0){var qb=-f.b/(2*f.a),eb=f.ev(qb),mn=Math.min.apply(null,xs),mx=Math.max.apply(null,xs);if(qb>=mn&&qb<=mx&&eb>0)return{x:qb,y:eb,dx:qb.toFixed(2),dy:eb.toFixed(1),label:'BEP '+rpm,color:col};}var best=rd.reduce(function(a,b){return b.eff>a.eff?b:a;},rd[0]);return{x:best.q,y:best.eff,dx:best.q.toFixed(2),dy:best.eff.toFixed(1),label:'BEP '+rpm,color:col};});}

function R(){var app=document.getElementById('app');app.innerHTML='';try{app.appendChild(rH());app.appendChild(rT());var c=h('div',{class:'cnt'});var fn={setup:rS,diagram:rDg,data:rDt,pq:rPQ,eff:rEf,affinity:rAf,dimless:rDm,compare:rCp};if(fn[S.tab])c.appendChild(fn[S.tab]());app.appendChild(c);}catch(e){app.appendChild(h('div',{style:'padding:40px;color:red;font-family:monospace'},'Error: '+e.message+'\n'+e.stack));}}
